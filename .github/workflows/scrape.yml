name: Daily scrape

on:
  schedule:
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          pip install -r requirements.txt

      - name: Run scrapers
        run: python src/run_snapshot.py

      - name: Commit and push
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "📊 daily scrape"
          commit_user_name: "scrape-bot"
          commit_user_email: "scrape-bot@users.noreply.github.com"
          file_pattern: "data/raw/*.csv data/processed/timeseries_data.csv data/processed/rentals_clean.csv data/estate.db"
